name: taxi_lakehouse
version: "1.0.0"
config-version: 2

profile: taxi_lakehouse

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

on-run-start:
  - "CREATE CATALOG IF NOT EXISTS dbt_project"
  - "CREATE SCHEMA IF NOT EXISTS dbt_project.enriched"

models:
  taxi_lakehouse:
    enriched:
      +database: dbt_project
      +schema: enriched
      +materialized: table
      +tags:
        - enriched
        - taxi_pipeline
